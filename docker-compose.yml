services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama:/root/.ollama

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=hrm
      - POSTGRES_USER=hrm
      - POSTGRES_PASSWORD=hrm
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT_S=60
      - OLLAMA_RETRIES=2
      - OLLAMA_RETRY_BACKOFF_S=1.0
      # Phase 6 (opt-in): set HRM_API_KEYS to enable auth (comma-separated)
      # - HRM_API_KEYS=dev_key_123,dev_key_456
      # Optional admin keys for dangerous endpoints
      # - HRM_ADMIN_API_KEYS=admin_key_123
      # Phase 7: tenant namespace for policy index
      - TENANT_ID=default
      # Audit retention (used by /audit/purge)
      - AUDIT_RETENTION_DAYS=30
      - RATE_LIMIT_PER_MIN=120
      - RATE_LIMIT_AUTH_BONUS=180
      - DATABASE_URL=postgresql+psycopg://hrm:hrm@postgres:5432/hrm
      - REDIS_URL=redis://redis:6379/0
      - OCR_LANG=vie+eng
      - OCR_DPI=300
      - OCR_PSM=6
      - OCR_OEM=1
      - OCR_CROP_RATIO=0.05
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
      - ./alembic:/app/alembic
    depends_on:
      - postgres
      - redis
      - ollama
    command: ["uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT_S=60
      - OLLAMA_RETRIES=2
      - OLLAMA_RETRY_BACKOFF_S=1.0
      - DATABASE_URL=postgresql+psycopg://hrm:hrm@postgres:5432/hrm
      - REDIS_URL=redis://redis:6379/0
      - WORKER_QUEUES=parse,index,llm,default
      - LOG_LEVEL=INFO
      - OCR_LANG=vie+eng
      - OCR_DPI=300
      - OCR_PSM=6
      - OCR_OEM=1
      - OCR_CROP_RATIO=0.05
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
      - ollama
    command: ["python", "-m", "backend.worker.run_worker"]

  worker_parse:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT_S=60
      - OLLAMA_RETRIES=2
      - OLLAMA_RETRY_BACKOFF_S=1.0
      - DATABASE_URL=postgresql+psycopg://hrm:hrm@postgres:5432/hrm
      - REDIS_URL=redis://redis:6379/0
      - TENANT_ID=default
      - RATE_LIMIT_PER_MIN=120
      - RATE_LIMIT_AUTH_BONUS=180
      - WORKER_QUEUES=parse,default
      - LOG_LEVEL=INFO
      - OCR_LANG=vie+eng
      - OCR_DPI=300
      - OCR_PSM=6
      - OCR_OEM=1
      - OCR_CROP_RATIO=0.05
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
      - ollama
    command: ["python", "-m", "backend.worker.run_worker"]

  worker_index:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT_S=60
      - OLLAMA_RETRIES=2
      - OLLAMA_RETRY_BACKOFF_S=1.0
      - DATABASE_URL=postgresql+psycopg://hrm:hrm@postgres:5432/hrm
      - REDIS_URL=redis://redis:6379/0
      - TENANT_ID=default
      - RATE_LIMIT_PER_MIN=120
      - RATE_LIMIT_AUTH_BONUS=180
      - WORKER_QUEUES=index,default
      - LOG_LEVEL=INFO
      - OCR_LANG=vie+eng
      - OCR_DPI=300
      - OCR_PSM=6
      - OCR_OEM=1
      - OCR_CROP_RATIO=0.05
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
      - ollama
    command: ["python", "-m", "backend.worker.run_worker"]

  worker_llm:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TIMEOUT_S=60
      - OLLAMA_RETRIES=2
      - OLLAMA_RETRY_BACKOFF_S=1.0
      - DATABASE_URL=postgresql+psycopg://hrm:hrm@postgres:5432/hrm
      - REDIS_URL=redis://redis:6379/0
      - TENANT_ID=default
      - RATE_LIMIT_PER_MIN=120
      - RATE_LIMIT_AUTH_BONUS=180
      - WORKER_QUEUES=llm,default
      - LOG_LEVEL=INFO
      - OCR_LANG=vie+eng
      - OCR_DPI=300
      - OCR_PSM=6
      - OCR_OEM=1
      - OCR_CROP_RATIO=0.05
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
      - ollama
    command: ["python", "-m", "backend.worker.run_worker"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - TENANT_ID=default
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
    depends_on:
      - api
      - ollama
    command: ["npm", "run", "dev"]

volumes:
  ollama:
  postgres:
